<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP PRO</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#E7E3DC;
}

header{
background:#B79C8C;
color:white;
padding:25px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.panel{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.boton{
background:#C9C1B3;
padding:25px;
border-radius:14px;
text-align:center;
font-weight:bold;
font-size:16px;
}
</style>

</head>

<body>

<header>GP PRO</header>

<div class="panel">
<div class="boton">Ventas</div>
<div class="boton">Diario</div>
<div class="boton">Pedidos</div>
<div class="boton">Proveedores</div>
<div class="boton">Artículos</div>
<div class="boton">Configuración</div>
</div>

</body>
</html>
