<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP PRO</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#E7E3DC;
}

header{
background:#B79C8C;
color:white;
padding:30px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.panel{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
}

.boton{
background:#C9C1B3;
border-radius:16px;
padding:30px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.incidencias{
background:#8B1E1E;
color:white;
}

.comunicaciones{
background:#D4A017;
color:black;
}
</style>

</head>

<body>

<header>GP PRO</header>

<div class="panel">

<div class="boton">Pedidos</div>
<div class="boton">Proveedores</div>

<div class="boton">Artículos</div>
<div class="boton">Comparador</div>

<div class="boton incidencias">Incidencias</div>
<div class="boton comunicaciones">Comunicaciones</div>

<div class="boton">Ventas</div>
<div class="boton">Histórico pedidos</div>

<div class="boton">Diario</div>
<div class="boton">Pagos</div>

<div class="boton">Calendario</div>
<div class="boton">Configuración</div>

<div class="boton">Recordatorios</div>
<div class="boton">Ayuda</div>

</div>

</body>
</html>
